<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ineedaquote.pls</title>
    <!-- Importing a cozy, wisdomic serif font -->
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --sage: #8da399;
            --dusty-rose: #b08d8d;
            --cream: #fdfcf0;
            --text-color: #4a4a4a;
        }

        body {
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Lora', serif;
            color: var(--text-color);
            /* NATURAL ANIMATED BACKGROUND */
            background: linear-gradient(120deg, var(--cream) 0%, #e8e4d9 100%);
            background-attachment: fixed;
            position: relative;
            overflow: hidden;
        }

        /* The "Wisdomic" Animated Background Layer */
        body::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            z-index: -1;
            background: radial-gradient(circle at 30% 30%, rgba(141, 163, 153, 0.2), transparent 40%),
                        radial-gradient(circle at 70% 70%, rgba(176, 141, 141, 0.2), transparent 40%),
                        url('background.png') repeat; /* Your pattern image still sits behind the colors */
            background-blend-mode: multiply;
            filter: blur(40px);
            opacity: 0.8;
            /* No keyframe animation here as requested - just a static, deep textured feel */
        }

        h1 { 
            font-size: 0.9rem; 
            font-weight: 400; 
            letter-spacing: 5px; 
            opacity: 0.4; 
            text-transform: lowercase; 
            margin-bottom: 2rem;
            position: relative;
        }

        /* THE CONTAINER - Minimalist Form */
        .container {
            background: rgba(255, 255, 255, 0.4);
            padding: 4rem 3rem;
            border-radius: 20px;
            max-width: 650px;
            width: 90%;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
            position: relative;
        }

        #quote-display {
            min-height: 220px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        #quote-text { 
            font-size: 1.9rem; 
            font-style: italic; 
            line-height: 1.5; 
            margin: 0;
            transition: opacity 0.8s ease, filter 0.8s ease;
        }

        #quote-author { 
            font-size: 0.85rem; 
            margin-top: 30px; 
            font-weight: 600;
            opacity: 0.6; 
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: opacity 0.8s ease;
        }

        /* THE BUTTON - Sage to Dusty Rose transition */
        button {
            margin-top: 50px;
            background: var(--sage);
            color: white;
            border: none;
            padding: 18px 45px;
            font-size: 0.9rem;
            font-family: inherit;
            letter-spacing: 2px;
            border-radius: 4px; /* More formal, less 'bubbly' shape */
            cursor: pointer;
            transition: background 0.6s ease, transform 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        button:hover {
            background: var(--dusty-rose);
            transform: translateY(-2px);
        }

        /* Transition States */
        .hidden {
            opacity: 0;
            filter: blur(5px);
        }
    </style>
</head>
<body>

    <h1>ineedaquote.pls</h1>

    <div class="container">
        <div id="quote-display">
            <p id="quote-text">"Patience is the companion of wisdom."</p>
            <p id="quote-author">— Saint Augustine</p>
        </div>
        <button onclick="getQuote()">SEEK WISDOM</button>
    </div>

    <script>
        const quotes = [
            { text: "Nature does not hurry, yet everything is accomplished.", author: "Lao Tzu" },
            { text: "The stars don't look bigger, but they do look brighter.", author: "Sally Ride" },
            { text: "Fall seven times, stand up eight.", author: "Japanese Proverb" },
            { text: "What we achieve inwardly will change outer reality.", author: "Plutarch" },
            { text: "Quiet the mind, and the soul will speak.", author: "Ma Jaya Sati Bhagavati" },
            { text: "Even the darkest night will end and the sun will rise.", author: "Victor Hugo" },
            { text: "Be happy for this moment. This moment is your life.", author: "Omar Khayyam" },
            { text: "Yesterday I was clever, so I wanted to change the world. Today I am wise, so I am changing myself.", author: "Rumi" }
            // Add your full list of 150 quotes here!
        ];

        function getQuote() {
            const textEl = document.getElementById('quote-text');
            const authorEl = document.getElementById('quote-author');
            
            // Apply hidden state
            textEl.classList.add('hidden');
            authorEl.classList.add('hidden');

            setTimeout(() => {
                const random = quotes[Math.floor(Math.random() * quotes.length)];
                textEl.innerText = `"${random.text}"`;
                authorEl.innerText = `— ${random.author}`;
                
                // Reveal
                textEl.classList.remove('hidden');
                authorEl.classList.remove('hidden');
            }, 800);
        }
    </script>
</body>
</html>
