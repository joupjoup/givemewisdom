<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ineedaquote.pls</title>
    <style>
        :root {
            --primary-sage: #8da399;
            --deep-sage: #6b7e75;
            --warm-cream: #fdfcf0;
            --text-main: #3d3d3d;
        }

        body {
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Lora', 'Georgia', serif;
            color: var(--text-main);
            overflow: hidden;
            background: url('background.png') repeat;
            position: relative;
        }

        /* ANIMATED GRADIENT OVERLAY */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(-45deg, rgba(253, 252, 240, 0.4), rgba(141, 163, 153, 0.2), rgba(230, 210, 180, 0.2));
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            z-index: -1;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h1 { 
            font-size: 0.9rem; 
            font-weight: 300; 
            letter-spacing: 6px; 
            opacity: 0.5; 
            text-transform: lowercase; 
            margin-bottom: 2rem;
            animation: fadeInDown 1.5s ease;
        }

        /* FLOATING GLASS CONTAINER */
        .container {
            background: rgba(255, 255, 255, 0.5);
            padding: 4rem 3rem;
            border-radius: 40px;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.6);
            text-align: center;
            transform: translateY(0);
            transition: transform 0.5s ease;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        #quote-display {
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        #quote-text { 
            font-size: 2rem; 
            font-style: italic; 
            line-height: 1.4; 
            margin: 0;
            transition: all 0.6s ease;
            opacity: 1;
        }

        #quote-author { 
            font-size: 0.8rem; 
            margin-top: 25px; 
            font-weight: 600;
            opacity: 0.5; 
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* THE ALIVE BUTTON */
        button {
            margin-top: 40px;
            background: var(--primary-sage);
            color: white;
            border: none;
            padding: 20px 50px;
            font-size: 1rem;
            font-family: inherit;
            border-radius: 100px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
            box-shadow: 0 8px 25px rgba(141, 163, 153, 0.4);
        }

        button:hover {
            background: var(--deep-sage);
            transform: scale(1.05) rotate(-1deg);
            box-shadow: 0 12px 35px rgba(141, 163, 153, 0.6);
        }

        button:active {
            transform: scale(0.95);
        }

        /* SIMPLE FADE ANIMATIONS */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 0.5; transform: translateY(0); }
        }

        .fade-out { opacity: 0; transform: scale(0.95); filter: blur(10px); }
    </style>
</head>
<body>

    <h1>ineedaquote.pls</h1>

    <div class="container">
        <div id="quote-display">
            <p id="quote-text">"Tap for a moment of clarity."</p>
            <p id="quote-author"></p>
        </div>
        <button onclick="getQuote()">GIVE ME WISDOM</button>

            { text: "Hope is the thing with feathers that perches in the soul.", author: "Emily Dickinson" },
            { text: "Light tomorrow with today.", author: "Elizabeth Barrett Browning" },
            { text: "Speak the truth, even if your voice shakes.", author: "Maggie Smith" }
            // Add your other 150 quotes here!
        ];

        function getQuote() {
            const textEl = document.getElementById('quote-text');
            const authorEl = document.getElementById('quote-author');
            
            // Add fade class
            textEl.classList.add('fade-out');
            authorEl.classList.add('fade-out');

            setTimeout(() => {
                const random = quotes[Math.floor(Math.random() * quotes.length)];
                textEl.innerText = `"${random.text}"`;
                authorEl.innerText = `— ${random.author}`;
                
                // Remove fade class to trigger re-entry
                textEl.classList.remove('fade-out');
                authorEl.classList.remove('fade-out');
            }, 500);
        }
    </script>
</body>
</html>
