    <style>
        :root {
            --sage: #8da399;
            --dusty-rose: #b08d8d;
            --cream: #fdfcf0;
            --text-color: #ffffff; /* Switched to white for better contrast over video */
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100%;
            font-family: 'Lora', serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* VIDEO BACKGROUND STYLING */
        #video-bg {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -2;
            object-fit: cover;
            filter: brightness(60%); /* Darkens video so text pops */
        }

        /* OVERLAY FOR TEXTURE */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0) 0%, rgba(0,0,0,0.4) 100%);
            z-index: -1;
        }

        h1 { 
            position: absolute;
            top: 30px;
            font-size: 0.9rem; 
            font-weight: 400; 
            letter-spacing: 5px; 
            opacity: 0.7; 
            color: white;
            text-transform: lowercase;
        }

        /* GLASS CONTAINER */
        .container {
            background: rgba(255, 255, 255, 0.15);
            padding: 4rem 3rem;
            border-radius: 20px;
            max-width: 700px;
            width: 85%;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        #quote-display {
            min-height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        #quote-text { 
            font-size: 2.1rem; 
            font-style: italic; 
            line-height: 1.4; 
            margin: 0;
            color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            transition: opacity 0.8s ease, filter 0.8s ease;
        }

        #quote-author { 
            font-size: 0.9rem; 
            margin-top: 30px; 
            font-weight: 600;
            opacity: 0.8; 
            color: white;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: opacity 0.8s ease;
        }

        button {
            margin-top: 50px;
            background: var(--sage);
            color: white;
            border: none;
            padding: 18px 45px;
            font-size: 0.9rem;
            font-family: inherit;
            letter-spacing: 2px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.5s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        button:hover {
            background: var(--dusty-rose);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        .hidden { opacity: 0; filter: blur(10px); }
    </style>

        function getQuote() {
            const textEl = document.getElementById('quote-text');
            const authorEl = document.getElementById('quote-author');
            
            textEl.classList.add('hidden');
            authorEl.classList.add('hidden');

            setTimeout(() => {
                const random = quotes[Math.floor(Math.random() * quotes.length)];
                textEl.innerText = `"${random.text}"`;
                authorEl.innerText = `— ${random.author}`;
                
                textEl.classList.remove('hidden');
                authorEl.classList.remove('hidden');
            }, 800);
