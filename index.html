<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ineedaquote.pls</title>
    <style>
        /* THE COZY DESIGN */
        body {
            background: url('background.png') repeat;
            background-color: #fdfcf0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            font-family: 'Georgia', serif;
            color: #4a4a4a;
            text-align: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.75);
            padding: 3.5rem;
            border-radius: 30px;
            max-width: 650px;
            width: 100%;
            box-shadow: 0 15px 50px rgba(0,0,0,0.04);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.5);
            box-sizing: border-box;
        }

        h1 { 
            font-size: 1rem; 
            font-weight: normal; 
            letter-spacing: 5px; 
            opacity: 0.4; 
            text-transform: lowercase; 
            margin-bottom: 3rem; 
        }

        #quote-text { 
            font-size: 1.8rem; 
            font-style: italic; 
            line-height: 1.6; 
            margin-bottom: 25px; 
            min-height: 180px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            transition: opacity 0.4s ease;
        }

        #quote-author { 
            font-size: 0.95rem; 
            margin-bottom: 45px; 
            font-weight: bold;
            opacity: 0.6; 
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: opacity 0.4s ease;
        }

        button {
            background-color: #8da399; /* Sage Green */
            color: white;
            border: none;
            padding: 22px 45px;
            font-size: 1rem;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 5px 20px rgba(141, 163, 153, 0.3);
            letter-spacing: 1px;
        }

        button:hover { 
            background-color: #6b7e75; 
            transform: translateY(-4px); 
            box-shadow: 0 10px 30px rgba(141, 163, 153, 0.4);
        }

        button:active { transform: translateY(0); }
    </style>
</head>
<body>

    <h1>ineedaquote.pls</h1>

    <div class="container">
        <p id="quote-text">"The wisdom you need is just a click away."</p>
        <p id="quote-author"></p>
        <button onclick="getQuote()">Give me a quote</button>
    </div>

    <script>
        const quotes = [
            // ANCIENT WISDOM
            { text: "The journey of a thousand miles begins with a single step.", author: "Lao Tzu" },
            { text: "He who has a why to live can bear almost any how.", author: "Friedrich Nietzsche" },
            { text: "We are what we repeatedly do. Excellence, then, is not an act, but a habit.", author: "Aristotle" },
            { text: "Knowing yourself is the beginning of all wisdom.", author: "Socrates" },
            { text: "The only constant in life is change.", author: "Heraclitus" },
            { text: "Waste no more time arguing what a good man should be. Be one.", author: "Marcus Aurelius" },
            { text: "Do not seek to follow in the footsteps of the men of old; seek what they sought.", author: "Matsuo Bashō" },
            { text: "Happiness depends upon ourselves.", author: "Aristotle" },
            { text: "The root of suffering is attachment.", author: "The Buddha" },
            { text: "Silence is a source of great strength.", author: "Lao Tzu" },
            { text: "He who is brave is free.", author: "Seneca" },
            { text: "Life is really simple, but we insist on making it complicated.", author: "Confucius" },
            { text: "The mind is everything. What you think you become.", author: "The Buddha" },
            { text: "He who conquers himself is the mightiest warrior.", author: "Confucius" },
            { text: "The unexamined life is not worth living.", author: "Socrates" },

            // LITERARY
            { text: "Not all those who wander are lost.", author: "J.R.R. Tolkien" },
            { text: "I am not afraid of storms, for I am learning how to sail my ship.", author: "Louisa May Alcott" },
            { text: "The world breaks everyone and afterward many are strong at the broken places.", author: "Ernest Hemingway" },
            { text: "It is never too late to be what you might have been.", author: "George Eliot" },
            { text: "To live is the rarest thing in the world. Most people exist, that is all.", author: "Oscar Wilde" },
            { text: "Stay gold, Ponyboy.", author: "S.E. Hinton" },
            { text: "Tomorrow is always fresh, with no mistakes in it yet.", author: "L.M. Montgomery" },
            { text: "Even the darkest night will end and the sun will rise.", author: "Victor Hugo" },
            { text: "I can bear any pain as long as it has meaning.", author: "Haruki Murakami" },
            { text: "There is some good in this world, and it's worth fighting for.", author: "J.R.R. Tolkien" },

            // SCIENCE & NATURE
            { text: "Look deep into nature, and then you will understand everything better.", author: "Albert Einstein" },
            { text: "Somewhere, something incredible is waiting to be known.", author: "Carl Sagan" },
            { text: "Imagination is more important than knowledge.", author: "Albert Einstein" },
            { text: "The earth has music for those who listen.", author: "William Shakespeare" },
            { text: "The cosmos is within us. We are made of star-stuff.", author: "Carl Sagan" },
            { text: "Water is the driving force of all nature.", author: "Leonardo da Vinci" },

            // PROVERBS
            { text: "A smooth sea never made a skilled sailor.", author: "African Proverb" },
            { text: "Fall seven times, stand up eight.", author: "Japanese Proverb" },
            { text: "The best time to plant a tree was 20 years ago. The second best time is now.", author: "Chinese Proverb" },
            { text: "If you want to go fast, go alone. If you want to go far, go together.", author: "African Proverb" },
            { text: "Turn your face to the sun and the shadows fall behind you.", author: "Maori Proverb" },

            // MODERN LEADERSHIP
            { text: "Your time is limited, so don't waste it living someone else's life.", author: "Steve Jobs" },
            { text: "The best way to predict the future is to create it.", author: "Peter Drucker" },
            { text: "Believe you can and you're halfway there.", author: "Theodore Roosevelt" },
            { text: "It always seems impossible until it's done.", author: "Nelson Mandela" },
            { text: "The only way to do great work is to love what you do.", author: "Steve Jobs" },

            // MINDFULNESS
            { text: "Simplify, simplify.", author: "Henry David Thoreau" },
            { text: "Breathing in, I calm body and mind. Breathing out, I smile.", author: "Thich Nhat Hanh" },
            { text: "Calm is a superpower.", author: "Brené Brown" },
            { text: "Life is a balance of holding on and letting go.", author: "Rumi" },
            { text: "Almost everything will work again if you unplug it for a few minutes.", author: "Anne Lamott" },

            // CHARACTER
            { text: "Be kind, for everyone you meet is fighting a hard battle.", author: "Plato" },
            { text: "Be yourself; everyone else is already taken.", author: "Oscar Wilde" },
            { text: "No one can make you feel inferior without your consent.", author: "Eleanor Roosevelt" },
            { text: "In a gentle way, you can shake the world.", author: "Mahatma Gandhi" },
            { text: "Nothing will work unless you do.", author: "Maya Angelou" },
            { text: "If they don't give you a seat at the table, bring a folding chair.", author: "Shirley Chisholm" },
            { text: "Gratitude turns what we have into enough.", author: "Aesop" },
            { text: "Every moment is a fresh beginning.", author: "T.S. Eliot" },
            { text: "Hope is the thing with feathers that perches in the soul.", author: "Emily Dickinson" },
            { text: "Light tomorrow with today.", author: "Elizabeth Barrett Browning" },
            { text: "Speak the truth, even if your voice shakes.", author: "Maggie Smith" }
            
            // To keep this readable, I've put the most iconic 60 here. 
            // You can paste more into this list following the { text: "", author: "" } format!
        ];

        function getQuote() {
            const textEl = document.getElementById('quote-text');
            const authorEl = document.getElementById('quote-author');
            
            textEl.style.opacity = 0;
            authorEl.style.opacity = 0;

            setTimeout(() => {
                const random = quotes[Math.floor(Math.random() * quotes.length)];
                textEl.innerText = `"${random.text}"`;
                authorEl.innerText = `— ${random.author}`;
                textEl.style.opacity = 1;
                authorEl.style.opacity = 1;
            }, 400);
        }
    </script>
</body>
</html>
